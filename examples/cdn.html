<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kairo - CDN Example</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        padding: 2rem;
        background: #f5f5f5;
      }
      .app {
        max-width: 600px;
        margin: 0 auto;
        background: white;
        padding: 2rem;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      h1 {
        color: #333;
        margin-bottom: 1rem;
      }
      .counter {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin: 1rem 0;
      }
      button {
        padding: 0.5rem 1rem;
        border: none;
        border-radius: 4px;
        background: #4f46e5;
        color: white;
        cursor: pointer;
        font-size: 1rem;
      }
      button:hover {
        background: #4338ca;
      }
      .count {
        font-size: 1.5rem;
        font-weight: bold;
        min-width: 3rem;
        text-align: center;
      }
      .info {
        color: #666;
        margin-top: 1rem;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <script src="../dist/index.mjs" type="module"></script>
    <script type="module">
      import {
        h,
        ref,
        computed,
        defineComponent,
        createApp
      } from '../dist/index.mjs'
      import htm from 'https://unpkg.com/htm@3?module'

      const html = htm.bind(h)

      const Counter = defineComponent((props) => {
        const count = ref(props.initial ?? 0)
        const double = computed(() => count.value * 2)

        console.log('Counter render~')

        return () => html`
          <div class="counter">
            <button onClick=${() => count.value--}>-</button>
            <span class="count">${count.value}</span>
            <button onClick=${() => count.value++}>+</button>
          </div>
          <p class="info">Double: ${double.value}</p>
        `
      })

      const App = defineComponent(() => {
        const title = ref('Hello Kairo!')

        console.log('App render~')

        return () => html`
          <div class="app">
            <h1>${title.value}</h1>
            <${Counter} initial=${5} />
            <p class="info" style="margin-top: 1.5rem">
              This example runs with zero build tools — just a CDN script tag +
              htm.
            </p>
          </div>
        `
      })

      console.log('App', App()())

      createApp(App).mount('#app')
    </script>
  </body>
</html>
